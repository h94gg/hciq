o:["A. 1","B. 1,2","C. 1,2,3","D. None of the above"],a:2},

];

let score = 0;
const quiz = document.getElementById("quiz");

quizData.forEach((qData) => {
    const div = document.createElement("div");
    div.classList.add("question");

    const title = document.createElement("h4");
    title.innerText = qData.q;
    div.appendChild(title);

    qData.o.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.innerText = opt;

        btn.onclick = () => {
            const buttons = div.querySelectorAll("button");
            buttons.forEach(b => b.disabled = true);

            if(i === qData.a){
                btn.classList.add("correct");
                score++;
            } else {
                btn.classList.add("wrong");
                buttons[qData.a].classList.add("correct");
            }

            if(document.querySelectorAll("button:disabled").length === quizData.length * 4){
                document.getElementById("result").innerText =
                "Your Score: " + score + " / " + quizData.length;
            }
        };

        div.appendChild(btn);
    });

    quiz.appendChild(div);
});
</script>

</body>
</html>
